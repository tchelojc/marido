<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profissionais · Marido de Aluguel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="dados.js"></script>
  <script src="profissionais.js"></script>
  <script src="integracao.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6fa;
      color: #1a2634;
      padding: 24px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: white;
      border-radius: 24px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e3c72, #2b4c7c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .back-btn {
      background: #eef2ff;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
      color: #1e3c72;
      transition: 0.2s;
    }
    .back-btn:hover {
      background: #e2e8f0;
      transform: translateY(-1px);
    }
    .service-title {
      background: white;
      border-radius: 20px;
      padding: 16px 24px;
      margin-bottom: 24px;
      border-left: 5px solid #2b4c7c;
    }
    .service-title h2 {
      margin-bottom: 8px;
    }
    .profissionais-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }
    .card-profissional {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .card-profissional:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
    }
    .card-content {
      padding: 20px;
    }
    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 16px;
      border: 2px solid #eef2ff;
    }
    .flex-row {
      display: flex;
      align-items: center;
    }
    .nome {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .avaliacao {
      color: #f5b042;
      margin-top: 4px;
      font-size: 0.9rem;
    }
    .descricao {
      margin: 12px 0;
      font-size: 0.85rem;
      color: #4a5b7a;
      line-height: 1.4;
    }
    .contato {
      background: #f8fafc;
      border-radius: 16px;
      padding: 12px;
      margin-top: 12px;
      font-size: 0.8rem;
    }
    .contato i {
      width: 24px;
      color: #2b4c7c;
    }
    .btn-contatar {
      background: #2b4c7c;
      color: white;
      border: none;
      width: 100%;
      padding: 10px;
      border-radius: 40px;
      margin-top: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-contatar:hover {
      background: #1e3c72;
      transform: translateY(-1px);
    }
    .btn-perfil {
      background: #4a5b7a;
      color: white;
      border: none;
      width: 100%;
      padding: 10px;
      border-radius: 40px;
      margin-top: 8px;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s;
    }
    .btn-perfil:hover {
      background: #3a4a6a;
      transform: translateY(-1px);
    }
    .no-results {
      text-align: center;
      padding: 50px;
      background: white;
      border-radius: 24px;
    }
    .no-results i {
      font-size: 3rem;
      color: #aaa;
      margin-bottom: 16px;
    }
    .small-text {
      font-size: 0.75rem;
      color: #5a6e8a;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.1rem;
      color: #2b4c7c;
    }
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid #eef2ff;
      border-top: 3px solid #2b4c7c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .tag-servico {
      display: inline-block;
      background: #eef2ff;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      margin-top: 8px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.75rem;
    }
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      background: #155724;
      color: white;
      padding: 14px 22px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #721c24; }
    .toast.info { background: #17a2b8; }
    @media (max-width: 700px) {
      .profissionais-grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>
<div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<div class="container">
  <div class="header">
    <div class="logo">🛠️ Marido de Aluguel</div>
    <a href="marido_aluguel.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar para serviços</a>
  </div>

  <div id="serviceInfo" class="service-title">
    <h2 id="servicoNome">Carregando...</h2>
    <p id="servicoCategoria" class="small-text"></p>
  </div>

  <div id="profissionaisContainer" class="profissionais-grid">
    <div class="loading"><div class="loading-spinner"></div><p>Carregando profissionais...</p></div>
  </div>
</div>

<script>
  // ========== TOAST ==========
  function toast(msg, tipo = 'success') {
    const el = document.getElementById('toast');
    if (!el) { alert(msg); return; }
    const txt = document.getElementById('toastMsg');
    txt.textContent = msg;
    el.className = `toast show ${tipo === 'error' ? 'error' : tipo === 'info' ? 'info' : ''}`;
    const icon = el.querySelector('i');
    if (icon) icon.className = tipo === 'error' ? 'fas fa-exclamation-circle' : tipo === 'info' ? 'fas fa-info-circle' : 'fas fa-check-circle';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'toast'; }, 3200);
  }

  // ========== FUNÇÃO AUXILIAR ESCAPE HTML ==========
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ========== FUNÇÃO PARA GERAR ESTRELAS ==========
  function gerarEstrelas(nota) {
    const notaNum = parseFloat(nota) || 0;
    const cheias = Math.floor(notaNum);
    const meia = notaNum % 1 >= 0.5;
    let estrelas = '';
    for (let i = 0; i < cheias; i++) estrelas += '★';
    if (meia) estrelas += '½';
    for (let i = 0; i < 5 - cheias - (meia ? 1 : 0); i++) estrelas += '☆';
    return estrelas;
  }

  // ========== FUNÇÃO PARA BUSCAR PROFISSIONAIS (ESTÁTICOS + BACKEND) ==========
  async function buscarProfissionais() {
    // obterTodosProfissionais() já faz a mesclagem:
    //   1. Chama o backend (profissionais.json do Drive)
    //   2. Mescla com PROFISSIONAIS_DATA (estáticos do profissionais.js)
    //   3. Backend tem prioridade (mesmo email = backend vence)
    const todos = await obterTodosProfissionais();
    console.log('Total profissionais (backend + estáticos):', todos.length);
    return Array.isArray(todos) ? todos : [];
  }

  // ========== FUNÇÃO PARA CRIAR CHAT ==========
  async function criarChatComProfissional(profissionalId, profissionalNome, servicoId, servicoNome) {
    const sess = obterSessao();
    if (!sess || sess.tipo !== 'cliente') {
      toast('Você precisa estar logado como cliente para conversar com profissionais.', 'error');
      setTimeout(() => {
        if (confirm('Deseja fazer login agora?')) {
          window.location.href = 'marido_aluguel.html';
        }
      }, 1000);
      return null;
    }
    
    const cliente = await buscarClientePorId(sess.usuarioId);
    if (!cliente) {
      toast('Erro ao identificar seu perfil. Faça login novamente.', 'error');
      return null;
    }
    
    try {
      const chat = await criarChat({
        clienteId: cliente.id,
        clienteNome: cliente.nome,
        profissionalId: profissionalId,
        profissionalNome: profissionalNome,
        servicoId: servicoId,
        servicoNome: servicoNome,
        quantidade: 1,
        unidade: 'serviço',
        valorEstimado: 0,
        tempoEstimado: 0,
        diasEstimados: 0,
        statusServico: 'negociacao'
      });
      
      return chat.id;
    } catch (err) {
      console.error('Erro ao criar chat:', err);
      toast('Erro ao iniciar conversa. Tente novamente.', 'error');
      return null;
    }
  }

  // ========== FUNÇÃO PARA CONTATAR PROFISSIONAL ==========
  async function contatarProfissional(profissionalId, profissionalNome, servicoId, servicoNome) {
    const sess = obterSessao();
    if (!sess) {
      toast('Faça login para conversar com o profissional.', 'info');
      setTimeout(() => {
        window.location.href = 'marido_aluguel.html';
      }, 1500);
      return;
    }
    
    if (sess.tipo === 'profissional') {
      toast('Você está logado como profissional. Para contratar serviços, faça login como cliente.', 'error');
      return;
    }
    
    const chatId = await criarChatComProfissional(profissionalId, profissionalNome, servicoId, servicoNome);
    if (chatId) {
      toast('Conversa iniciada! Redirecionando para o chat...', 'success');
      setTimeout(() => {
        window.location.href = `chat.html?chat=${chatId}`;
      }, 1000);
    }
  }

  // ========== OBTÉM PARÂMETRO DA URL ==========
  const urlParams = new URLSearchParams(window.location.search);
  const servicoId = urlParams.get('id');

  // ========== FUNÇÃO PRINCIPAL ASSÍNCRONA ==========
  (async () => {
    const container = document.getElementById('profissionaisContainer');
    const nomeServicoEl = document.getElementById('servicoNome');
    const categoriaServicoEl = document.getElementById('servicoCategoria');

    // 1. Valida ID do serviço
    if (!servicoId) {
      nomeServicoEl.innerText = 'Serviço não especificado';
      categoriaServicoEl.innerHTML = '';
      container.innerHTML = `<div class="no-results">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Nenhum serviço foi selecionado.</p>
        <a href="marido_aluguel.html" class="back-btn" style="display: inline-block; margin-top: 16px;">Voltar para serviços</a>
      </div>`;
      return;
    }

    // 2. Carrega informações do serviço
    const servicoEncontrado = obterServicoPorId(servicoId);
    if (servicoEncontrado) {
      const precoUnitario = servicoEncontrado.preco_unitario?.toFixed(2) || (servicoEncontrado.diaria_base / servicoEncontrado.producao_dia).toFixed(2);
      nomeServicoEl.innerText = servicoEncontrado.nome;
      categoriaServicoEl.innerHTML = `
        <i class="fas fa-tag"></i> Categoria: ${escapeHtml(servicoEncontrado.categoria)} · 
        Preço médio: <strong>R$ ${precoUnitario}</strong> / ${escapeHtml(servicoEncontrado.unidade)} · 
        Produtividade: ${servicoEncontrado.producao_dia} ${escapeHtml(servicoEncontrado.unidade)}/dia
      `;
    } else {
      nomeServicoEl.innerText = 'Serviço não encontrado';
      categoriaServicoEl.innerHTML = '';
      container.innerHTML = `<div class="no-results">
        <i class="fas fa-search"></i>
        <p>Serviço não encontrado na base de dados.</p>
        <a href="marido_aluguel.html" class="back-btn" style="display: inline-block; margin-top: 16px;">Voltar para serviços</a>
      </div>`;
      return;
    }

    // 3. Carrega profissionais (local + backend)
    try {
      toast('Carregando profissionais...', 'info');
      
      const todosProfissionais = await buscarProfissionais();
      
      console.log('Total de profissionais carregados:', todosProfissionais.length);
      console.log('Buscando profissionais com serviço ID:', servicoId);
      
      // Filtra profissionais que oferecem este serviço
      const profissionaisFiltrados = todosProfissionais.filter(prof => {
        if (!prof) return false;
        if (!prof.servicos_ids) return false;
        if (!Array.isArray(prof.servicos_ids)) return false;
        // Compara como string e como número
        return prof.servicos_ids.includes(servicoId) || 
               prof.servicos_ids.includes(parseInt(servicoId)) ||
               prof.servicos_ids.includes(String(servicoId));
      });

      console.log('Profissionais filtrados:', profissionaisFiltrados.length);
      if (profissionaisFiltrados.length > 0) {
        console.log('Profissionais encontrados:', profissionaisFiltrados.map(p => p.nome));
      }

      if (profissionaisFiltrados.length === 0) {
        container.innerHTML = `<div class="no-results">
          <i class="fas fa-user-slash"></i>
          <p style="margin-top: 16px;">Nenhum profissional cadastrado para este serviço ainda.</p>
          <p class="small-text">Volte em breve ou seja o primeiro a contratar!</p>
          <a href="cadastro.html?tipo=profissional" class="back-btn" style="display: inline-block; margin-top: 16px;">Cadastrar como profissional</a>
        </div>`;
        return;
      }

      // 4. Busca avaliações para cada profissional
      const profissionaisComAvaliacoes = await Promise.all(profissionaisFiltrados.map(async (prof) => {
        try {
          const avaliacoes = await obterAvaliacoesProfissional(prof.id);
          const totalAvaliacoes = avaliacoes.length;
          let mediaAvaliacoes = 0;
          if (totalAvaliacoes > 0) {
            mediaAvaliacoes = avaliacoes.reduce((acc, a) => acc + (a.nota || 0), 0) / totalAvaliacoes;
          }
          return { ...prof, mediaAvaliacoes, totalAvaliacoes };
        } catch (err) {
          console.error(`Erro ao buscar avaliações para ${prof.nome}:`, err);
          return { ...prof, mediaAvaliacoes: 0, totalAvaliacoes: 0 };
        }
      }));

      // 5. Ordena por avaliação (melhores primeiro)
      profissionaisComAvaliacoes.sort((a, b) => b.mediaAvaliacoes - a.mediaAvaliacoes);

      // 6. Renderiza cards
      container.innerHTML = profissionaisComAvaliacoes.map(prof => {
        // Verifica se avatar é URL válida ou usa fallback
        let avatarUrl = prof.avatar;
        if (!avatarUrl || avatarUrl.startsWith('data:image')) {
          avatarUrl = `https://ui-avatars.com/api/?background=2b4c7c&color=fff&name=${encodeURIComponent(prof.nome)}`;
        }
        
        const estrelas = gerarEstrelas(prof.mediaAvaliacoes);
        const totalAvaliacoes = prof.totalAvaliacoes;
        
        return `
          <div class="card-profissional">
            <div class="card-content">
              <div class="flex-row">
                <img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(prof.nome)}" class="avatar" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?background=2b4c7c&color=fff&name=${encodeURIComponent(prof.nome)}'">
                <div>
                  <div class="nome">${escapeHtml(prof.nome)}</div>
                  <div class="avaliacao" title="${prof.mediaAvaliacoes.toFixed(1)} de 5 estrelas">
                    ${estrelas} <span class="small-text">(${totalAvaliacoes} ${totalAvaliacoes === 1 ? 'avaliação' : 'avaliações'})</span>
                  </div>
                </div>
              </div>
              <div class="descricao">${escapeHtml(prof.descricao || 'Profissional ainda não adicionou uma descrição.')}</div>
              <div class="contato">
                <div><i class="fas fa-phone-alt"></i> ${escapeHtml(prof.telefone || 'Não informado')}</div>
                <div><i class="fas fa-envelope"></i> ${escapeHtml(prof.email)}</div>
                ${prof.endereco ? `<div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(prof.endereco)}</div>` : ''}
              </div>
              <div class="info-row">
                <span class="tag-servico"><i class="fas fa-tools"></i> ${escapeHtml(servicoEncontrado.nome)}</span>
                <span class="tag-servico"><i class="fas fa-star"></i> ${prof.mediaAvaliacoes.toFixed(1)}</span>
              </div>
              <button class="btn-contatar" data-prof-id="${prof.id}" data-prof-nome="${escapeHtml(prof.nome)}" data-serv-id="${servicoId}" data-serv-nome="${escapeHtml(servicoEncontrado.nome)}">
                <i class="fas fa-comment"></i> Falar com profissional
              </button>
              <a href="perfil_publico.html?id=${encodeURIComponent(prof.id)}" class="btn-perfil">
                <i class="fas fa-user-circle"></i> Ver perfil completo
              </a>
            </div>
          </div>
        `;
      }).join('');

      // 7. Adiciona event listeners para os botões de contato
      document.querySelectorAll('.btn-contatar').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const profId = btn.dataset.profId;
          const profNome = btn.dataset.profNome;
          const servId = btn.dataset.servId;
          const servNome = btn.dataset.servNome;
          
          btn.disabled = true;
          btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Iniciando...';
          
          await contatarProfissional(profId, profNome, servId, servNome);
          
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-comment"></i> Falar com profissional';
        });
      });

    } catch (err) {
      console.error('Erro ao carregar profissionais:', err);
      container.innerHTML = `<div class="no-results">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Erro ao carregar profissionais. Tente novamente mais tarde.</p>
        <p class="small-text">${escapeHtml(err.message)}</p>
        <button onclick="location.reload()" class="back-btn" style="margin-top: 16px;">Tentar novamente</button>
      </div>`;
    }
  })();
</script>
</body>
</html>
